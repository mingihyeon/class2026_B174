<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>커피 마시는 캐릭터</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5f5f5;
    }

    .character {
        position: relative;
        width: 120px;
        height: 200px;
    }

    /* 얼굴 */
    .face {
        width: 100px;
        height: 100px;
        background: #ffe0bd;
        border-radius: 50%;
        position: absolute;
        top: 0;
        left: 10px;
        z-index: 2;
    }

    /* 눈 */
    .eye {
        width: 10px;
        height: 10px;
        background: black;
        border-radius: 50%;
        position: absolute;
        top: 40px;
    }

    .eye.left { left: 25px; }
    .eye.right { right: 25px; }

    /* 입 */
    .mouth {
        width: 20px;
        height: 10px;
        border-bottom: 3px solid black;
        border-radius: 0 0 20px 20px;
        position: absolute;
        top: 65px;
        left: 40px;
    }

    /* 컵 */
    .cup {
        width: 40px;
        height: 40px;
        background: #6b4f4f;
        border-radius: 5px;
        position: absolute;
        bottom: 20px;
        left: 40px;
        transform-origin: top right;
        animation: drink 2s infinite ease-in-out;
    }

    /* 손 */
    .hand {
        width: 15px;
        height: 60px;
        background: #ffe0bd;
        position: absolute;
        bottom: 20px;
        left: 55px;
        transform-origin: top;
        animation: drink 2s infinite ease-in-out;
    }

    /* 애니메이션 */
    @keyframes drink {
        0%, 100% {
            transform: rotate(0deg) translateY(0);
        }
        50% {
            transform: rotate(-50deg) translateY(-20px);
        }
    }

</style>
</head>
<body>

<div class="character">
    <div class="face">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
    </div>

    <div class="hand"></div>
    <div class="cup"></div>
</div>

</body>
</html>
